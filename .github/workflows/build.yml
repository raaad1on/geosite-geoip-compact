name: Build compact geosite and geoip

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'dist/**'
  workflow_dispatch:
  schedule:
    # Ежедневно 03:00 UTC
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Prepare GOPATH and PATH
        run: |
          echo "GOPATH=$HOME/go" >> $GITHUB_ENV
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install tools (geoview, v2dat)
        run: |
          go install github.com/snowie2000/geoview@latest
          go install github.com/urlesistiana/v2dat@latest

      - name: Clone domain-list-community
        run: |
          git clone --depth=1 https://github.com/v2fly/domain-list-community.git

      - name: Flatten category-ru with all includes (v2fly)
        run: |
          python3 scripts/flatten_category_ru.py domain-list-community/data

      - name: Download RunetFreedom geosite.dat
        run: |
          mkdir -p work
          curl -fsSL -o work/runetfreedom-geosite.dat \
            https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geosite.dat

      - name: Unpack RunetFreedom lists for merge
        run: |
          mkdir -p work/runetfreedom-unpack
          v2dat unpack geosite -o work/runetfreedom-unpack \
            -f category-gov-ru -f ru-available-only-inside \
            work/runetfreedom-geosite.dat

      - name: Merge RunetFreedom into category-ru (deduped)
        run: |
          python3 scripts/merge_runetfreedom_into_category_ru.py \
            domain-list-community/data/category-ru \
            work/runetfreedom-unpack

      - name: Regenerate dlc.dat from merged data
        run: |
          cd domain-list-community
          go run ./

      - name: Download upstream geoip.dat (Loyalsoldier)
        run: |
          mkdir -p work
          curl -fsSL -o work/geoip.dat \
            https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat

      - name: Build compact geosite.dat from dlc
        run: |
          mkdir -p dist
          geoview -type geosite -action convert \
            -input domain-list-community/dlc.dat \
            -list "private,category-ru,category-ads,PRIVATE,CATEGORY-RU,CATEGORY-ADS" \
            -output dist/geosite-compact.dat \
            -format geosite \
            -strict=false

      - name: Build compact geoip.dat (RU, PRIVATE)
        run: |
          mkdir -p dist
          geoview -type geoip -action convert \
            -input work/geoip.dat \
            -list "RU,PRIVATE" \
            -output dist/geoip-compact.dat \
            -format geoip \
            -strict=false

      - name: Verify geoip-compact contains tag ru
        run: |
          mkdir -p work/geoip-verify
          v2dat unpack geoip -o work/geoip-verify -f ru dist/geoip-compact.dat
          f=$(ls work/geoip-verify/*_ru.txt)
          if [ ! -s "$f" ]; then
            echo "geoip-compact: empty ru list"
            exit 1
          fi
          echo "geoip ru rules: $(wc -l < "$f")"

      - name: Export text lists for verification
        run: |
          mkdir -p dist/text
          v2dat unpack geoip -o dist/text -f ru -f private dist/geoip-compact.dat
          v2dat unpack geosite -o dist/text -f private -f category-ru -f category-ads dist/geosite-compact.dat

      - name: Sanity check category-ru is not empty
        run: |
          if [ ! -s dist/text/geosite-compact_category-ru.txt ]; then
            echo "category-ru list is empty"
            exit 1
          fi

      # GITHUB_ENV нельзя использовать в if: следующего шага — только job outputs / step outputs.
      - name: Commit dist if changed
        id: commit_dist
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dist
            git commit -m "Update compact geosite/geoip [skip ci]"
            git push
            echo "dist_committed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes in dist, nothing to commit."
            echo "dist_committed=false" >> $GITHUB_OUTPUT
          fi

      # Тег latest должен указывать на коммит этой сборки (в т.ч. после коммита dist), иначе в UI релиз «старый».
      - name: Prepare GitHub Release (notes + tag latest → HEAD)
        id: release_prep
        if: |
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
          (steps.commit_dist.outputs.dist_committed == 'true' ||
           github.event_name == 'schedule' ||
           github.event_name == 'workflow_dispatch' ||
           github.event_name == 'push')
        run: |
          set -e
          HEAD_SHA="$(git rev-parse HEAD)"
          {
            echo "**Сборка (UTC):** $(date -u +'%Y-%m-%d %H:%M:%S')"
            echo "**Коммит:** \`${HEAD_SHA}\`"
            echo "**Событие:** \`${{ github.event_name }}\`"
            echo "**Workflow:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "### Состав"
            echo "- \`geoip-compact.dat\`, \`geosite-compact.dat\` — для Xray (geoip: ru/private; geosite: private, category-ru, category-ads)."
            echo "- \`*.txt\` — те же списки в текстовом виде (v2dat unpack)."
          } > release_notes.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa latest "${HEAD_SHA}" -m "Latest compact geo build"
          git push -f origin refs/tags/latest

      - name: Create or update GitHub Release
        if: |
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
          (steps.commit_dist.outputs.dist_committed == 'true' ||
           github.event_name == 'schedule' ||
           github.event_name == 'workflow_dispatch' ||
           github.event_name == 'push')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          make_latest: true
          body_path: release_notes.md
          overwrite_files: true
          files: |
            dist/geoip-compact.dat
            dist/geosite-compact.dat
            dist/text/*.txt
